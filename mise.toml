[tools]
uv = "0.11.16"
ruff = "0.15.2"
ty = "0.0.18"
pre-commit = "latest"


[settings]
experimental = true

[env]
UV_PYTHON = "3.13"

[tasks.lint]
description = "Run ruff linter"
run = "ruff check ."

[tasks.format]
description = "Format code with ruff"
run = "ruff format ."

[tasks."format:check"]
description = "Check formatting without modifying files"
run = "ruff format --check ."

[tasks.typecheck]
description = "Run ty type checker"
run = "uv run ty check ."

[tasks.test]
description = "Run pytest"
run = "uv run pytest -q"

[tasks.check]
description = "Run all checks (lint, format, typecheck, test)"
run = """
ruff check .
ruff format --check .
uv run ty check .
uv run pytest -q
"""

[tasks.dev]
description = "Start MCP HTTP server with auto-reload on code changes"
run = """
uv run watchmedo auto-restart \
  --directory mcp_bauplan \
  --pattern '*.py;*.md' \
  --recursive \
  -- python main.py --transport streamable-http
"""
